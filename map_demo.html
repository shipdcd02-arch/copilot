<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주소 지도 시각화</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.85; margin-left: auto; }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 사이드바 */
    .sidebar {
      width: 300px;
      background: white;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.08);
      z-index: 500;
    }

    .sidebar-title {
      padding: 16px;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      border-bottom: 1px solid #eee;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .location-item {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .location-item:hover { background: #f5f8ff; }
    .location-item.active { background: #e8f0fe; border-left: 3px solid #1a73e8; }

    .pin-icon {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .location-info { flex: 1; }
    .location-name { font-size: 14px; font-weight: 600; color: #222; margin-bottom: 4px; }
    .location-address { font-size: 12px; color: #888; line-height: 1.4; }

    /* 지도 */
    #map {
      flex: 1;
    }

    /* 커스텀 팝업 */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      padding: 0;
    }

    .popup-content {
      padding: 14px 16px;
      min-width: 180px;
    }

    .popup-name {
      font-size: 14px;
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    .popup-address {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .popup-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      color: white;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  <h1>주소 지도 시각화</h1>
  <span id="count-label">0개 위치</span>
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-title">위치 목록</div>
    <div id="location-list"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── 샘플 주소 데이터 ──────────────────────────────────────────────
  const locations = [
    {
      name: "서울시청",
      address: "서울특별시 중구 세종대로 110",
      lat: 37.5663,
      lng: 126.9779,
      color: "#e53935"
    },
    {
      name: "경복궁",
      address: "서울특별시 종로구 사직로 161",
      lat: 37.5796,
      lng: 126.9770,
      color: "#8e24aa"
    },
    {
      name: "강남역",
      address: "서울특별시 강남구 강남대로 396",
      lat: 37.4979,
      lng: 127.0276,
      color: "#1e88e5"
    },
    {
      name: "상암 월드컵경기장",
      address: "서울특별시 마포구 월드컵북로 396",
      lat: 37.5683,
      lng: 126.8971,
      color: "#43a047"
    },
    {
      name: "롯데월드타워",
      address: "서울특별시 송파구 올림픽로 300",
      lat: 37.5126,
      lng: 127.1021,
      color: "#fb8c00"
    },
    {
      name: "인천국제공항",
      address: "인천광역시 중구 공항로 272",
      lat: 37.4602,
      lng: 126.4407,
      color: "#00897b"
    },
  ];
  // ────────────────────────────────────────────────────────────────

  // 지도 초기화
  const map = L.map('map').setView([37.5400, 127.0000], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  document.getElementById('count-label').textContent = `${locations.length}개 위치`;

  const markers = [];
  const listContainer = document.getElementById('location-list');

  locations.forEach((loc, i) => {
    // 커스텀 마커 SVG
    const svgIcon = L.divIcon({
      className: '',
      html: `
        <svg width="32" height="44" viewBox="0 0 32 44" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 28 16 28S32 26 32 16C32 7.163 24.837 0 16 0z"
                fill="${loc.color}" stroke="white" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="6" fill="white"/>
          <text x="16" y="20" text-anchor="middle" font-size="10" font-weight="bold"
                fill="${loc.color}" font-family="sans-serif">${i + 1}</text>
        </svg>`,
      iconSize: [32, 44],
      iconAnchor: [16, 44],
      popupAnchor: [0, -44]
    });

    const marker = L.marker([loc.lat, loc.lng], { icon: svgIcon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-content">
          <div class="popup-name">${i + 1}. ${loc.name}</div>
          <div class="popup-address">${loc.address}</div>
          <span class="popup-badge" style="background:${loc.color}">위치 확인</span>
        </div>`, { className: 'custom-popup' });

    markers.push(marker);

    // 사이드바 아이템
    const item = document.createElement('div');
    item.className = 'location-item';
    item.dataset.index = i;
    item.innerHTML = `
      <div class="pin-icon" style="background:${loc.color}"></div>
      <div class="location-info">
        <div class="location-name">${i + 1}. ${loc.name}</div>
        <div class="location-address">${loc.address}</div>
      </div>`;

    item.addEventListener('click', () => {
      // 모든 active 제거
      document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');

      map.flyTo([loc.lat, loc.lng], 16, { duration: 0.8 });
      setTimeout(() => markers[i].openPopup(), 800);
    });

    listContainer.appendChild(item);
  });

  // 전체 마커가 보이도록 자동 줌
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds().pad(0.15));
</script>
</body>
</html>
