<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>네이버 지도 테스트</title>
  <script type="text/javascript"
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ddzk96e01d">
  </script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #map { width: 600px; height: 400px; border: 1px solid #ccc; margin-top: 10px; }
    #status { padding: 10px; background: #f0f0f0; border-radius: 4px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>네이버 지도 API 인증 테스트</h2>
  <div id="status">로딩 중...</div>
  <div id="map"></div>

  <script>
    try {
      const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.5663, 126.9779),
        zoom: 13
      });
      document.getElementById('status').style.background = '#d4edda';
      document.getElementById('status').style.color = '#155724';
      document.getElementById('status').textContent = '✅ 인증 성공! 네이버 지도가 정상 로드됐습니다.';
    } catch(e) {
      document.getElementById('status').style.background = '#f8d7da';
      document.getElementById('status').style.color = '#721c24';
      document.getElementById('status').textContent = '❌ 오류: ' + e.message;
    }
  </script>
</body>
</html>
